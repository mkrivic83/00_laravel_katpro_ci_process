name: Laravel CI process

on:
  push:
    branches: [dev]
#KORACI
jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

    #DODAVANJE PHP-A
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none

    #DODAVANJE COMPOSERA I LARAVELA
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

    #DODAVANJE npm paketa

      - name: Install NPM dependencies
        run: npm install

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

    #DODAVANJE build-a za produkciju
      - name: Build Vite assets
        run: npm run build

    #PROVJERA LARAVEL VERZIJE
      - name: Verify Laravel application
        run: php artisan --version

    #POPIS RUTA
      - name: Popis ruta
        run: php artisan route:list

    #DODAVANJE BAZE/MIGRACIJA
      - name: Run database migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan migrate --force

    #DODAVANJE PHP UNIT TESTOVA

      - name: Run PHPUnit Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test

    #AUTOMATSKO DODAVANJE OZNAKE BUILD-A
      - name: Generate DEV build information
        if: success()
        run: |
          echo "APP_BUILD=dev-${{github.run_number}}" >> "$GITHUB_ENV"
          echo "APP_COMMIT=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

    #instalacija railway CLI
      - name: Install Railway CLI
        if: success()
        run: npm install -g @railway/cli


    #ČITANJE RAILWAY VARIJABLI
      - name: Railway Read APP_VERSION
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |

          echo "===== DOHVAĆANJE VARIJABLE ====="
          
          # 1. Dohvati JSON ispis svih varijabli i filtriraj samo APP_VERSION pomoću jq
          APP_VERSION=$(railway variables \
            --service "00_laravel_katpro_ci_process" \
            --environment "dev" \
            --json | jq -r '.APP_VERSION')
          
          # 2. Provjera je li vrijednost uspješno pročitana
          if [ "$APP_VERSION" = "null" ] || [ -z "$APP_VERSION" ]; then
            echo "Greška: Varijabla APP_VERSION nije pronađena na Railwayu!"
            exit 1
          fi

          echo "Uspješno pročitana verzija: $APP_VERSION"
          
          # 3. Spremanje u GitHub Environment kako bi je mogao koristiti u idućim koracima (ako zatreba)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
 # NOVO: Povećava MAJOR, MINOR ili PATCH prema početku commit poruke
      - name: Calculate semantic version
        if: success()
        shell: bash
        run: |

          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

          echo "Commit poruka: $COMMIT_MESSAGE"

          echo "Trenutna Railway verzija: $APP_VERSION"

          # Rastavljanje verzije MAJOR.MINOR.PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$APP_VERSION"

          VERSION_CHANGE="none"
          NEW_VERSION="$APP_VERSION"

          # MAJOR
          if [[ "$COMMIT_MESSAGE" == breaking:* ]]; then

            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0

            VERSION_CHANGE="major"

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # MINOR
          elif [[ "$COMMIT_MESSAGE" == feat:* ]]; then

            MINOR=$((MINOR + 1))
            PATCH=0

            VERSION_CHANGE="minor"

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # PATCH
          elif [[ "$COMMIT_MESSAGE" == fix:* ]]; then

            PATCH=$((PATCH + 1))

            VERSION_CHANGE="patch"

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          else

            echo "Commit ne počinje s fix:, feat: ili breaking:"

            echo "Verzija ostaje ista."

          fi

          echo ""
          echo "======================================"
          echo "Vrsta promjene : $VERSION_CHANGE"
          echo "Stara verzija  : $APP_VERSION"
          echo "Nova verzija   : $NEW_VERSION"
          echo "======================================"

          echo "VERSION_CHANGE=$VERSION_CHANGE" >> "$GITHUB_ENV"

          echo "APP_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

    #AŽUIRANJE ENV VARIJABLI U RAILWAY DEV OKOLINI
      - name: Update Railway EDUC build number
        if: success()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variable set \
            --service "00_laravel_katpro_ci_process" \
            --environment "dev" \
            APP_BUILD="$APP_BUILD" \
            APP_COMMIT="$APP_COMMIT"

    #UVJET ZA USPJEŠAN BUILD
      - name: CI uspješan
        if: success()
        run: |
          echo "==============================="
          echo "==========CI PASSED============"
          echo "==========SPREMNO ZA DEPLOY===="
          echo "==============================="

    #UVJET ZA FAILED BUILD
      - name: CI neuspješan
        if: failure()
        run: |
          echo "==============================="
          echo "==========CI FAILED============"
          echo "==========NEMA DEPLOYA========="
          echo "====== Datum $(date) =========="
          echo "==============================="        


    #ZAVRŠNA STATISTIKA
      - name: Završna statistika
        if: always()
        run: |
          echo "==============================="
          echo "====LARAVEL CI završio========="
          echo " Repository: ${{ github.repository}}"
          echo " Branch: ${{ github.ref_name}}"
          echo " Commiter: ${{ github.actor}}"
          echo " Commit SHA: ${{ github.sha}}"
          echo " Workspace : ${{ github.workspace}}"
          echo " Datum : $(date '+%d.%m.%Y %H:%M:%S')"

    #IZVRŠAVANJE SAMO AKO SE RADI O GRANI MAIN
      - name: Produkcijska grana
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Ovaj workflow se izvršava samo na main grani"
          echo "Main grana se u našem primjeru smatra produkcijskom granom"


    #IZVRŠAVANJE SAMO AKO commit poruka sadrži riječ "deploy"
      - name: Commit sadrži riječ deploy
        if: contains(github.event.head_commit.message,'deploy')
        run: |
          echo "Commit poruka sadrži riječ deploy"
          echo "Poruka commita: ${{github.event.head_commit.message}}"