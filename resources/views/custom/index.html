<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>InfinityFree Test</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            max-width: 650px;
            text-align: center;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin-top: 0;
            color: #1565c0;
            font-size: 34px;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #e3f2fd;
            color: #1565c0;
            border-radius: 999px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>InfinityFree radi uspješno!</h1>

        <p>
            Ovo je testna HTML stranica postavljena na hosting.
            Ako vidite ovu poruku, upload datoteka je uspješno odrađen.
        </p>

        <div class="badge">
            Test upload-a uspješan ✅
        </div>
    </div>

</body>
</html>
